tools:
  - fn: mcc.contrib.http:request
    groups: [admin, http]
    example: 'request(method="POST", url="https://api.example.com/data", json={"key": "value"})'
  - fn: mcc.contrib.http:request
    name: responsible-get
    groups: [public, http]
    example: 'responsible-get(url="https://example.com")'
    params:
      - name: method
        type: str
        override: GET
      - name: responsible
        type: bool
        override: true
      - name: url
        type: str  
