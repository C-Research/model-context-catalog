groups: [admin, system]
tools:
  - fn: mcc.contrib.system:get_env
  - fn: mcc.contrib.system:list_env
  - fn: mcc.contrib.system:info
    name: platform
  - fn: mcc.contrib.system:path
    name: pythonpath
  - fn: mcc.contrib.system:set_env
  - fn: mcc.contrib.subprocess:bash
  - name: python
    exec: python -c 'import json, sys; exec(json.load(sys.stdin)["source"])'
    description: run arbitrary python code
    stdin: true
    params:
      - name: source
        type: str
