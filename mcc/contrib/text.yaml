groups: [public, text]
tools:
  - fn: mcc.contrib.text:base64_encode
  - fn: mcc.contrib.text:base64_decode
  - fn: mcc.contrib.text:hash
  - fn: mcc.contrib.text:diff

  - name: regex_search
    fn: re:findall
    params:
      - name: pattern
        type: str
      - name: string
        type: str
      - name: flags
        type: int
        default: 0
  - name: regex_replace
    fn: re:sub
    params:
      - name: pattern
        type: str
      - name: repl
        type: str
      - name: string
        type: str
      - name: flags
        type: int
        default: 0
  
  - name: jq
    exec: echo {{ content | quote }} | jq {{ opts }} {{ filter | quote }}
    params:
      - name: filter
        type: str
        default: .content
        description: filter expression
      - name: content
        type: str
        description: source json content
      - name: opts
        type: str
        default: ""
        description: options for jq command
    description: | 
      jq is a tool for processing JSON inputs, applying the given filter to
      its JSON text inputs and producing the filter's results as JSON on
      standard output.