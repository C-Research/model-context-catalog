default:
  auth: "dev-admin"
  tools: []

  cache:
    backend: "mem://"
    search_ttl: 60

  embedding_model: "BAAI/bge-small-en-v1.5"
  embedding_dims: 384

  server:
    transport: sse
    port: 8000
    host: 0.0.0.0
    response_max_size: 5000000

  elasticsearch:
    host: "localhost"
    port: 9200
    scheme: "http"
    user_index: "mcc-users"
    tool_index: "mcc-tools"
    username: ""
    password: ""

  oauth:
    base_url: "http://localhost:8000"
    client_id: ""
    client_secret: ""

  jwt:
    jwks_uri: ""
    issuer: ""
    audience: ""
    authorization_server: ""
    base_url: "http://localhost:8000"
    required_scopes: []

  logging:
    version: 1
    disable_existing_loggers: false
    formatters:
      standard:
        format: "%(levelname)s [%(name)s] %(message)s"
      verbose:
        format: "%(asctime)s %(levelname)s [%(name)s] %(message)s"
    handlers:
      console:
        class: "logging.StreamHandler"
        formatter: "standard"
    loggers:
      mcc:
        level: "WARNING"
        handlers:
          - "console"
        propagate: false

development:
  dynaconf_merge: true

  logging:
    loggers:
      mcc:
        level: "DEBUG"

production:
  dynaconf_merge: true

  embedding_model: "snowflake/snowflake-arctic-embed-m"
  embedding_dims: 768

  logging:
    handlers:
      console:
        formatter: "verbose"
    loggers:
      mcc:
        level: "INFO"
