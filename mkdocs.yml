site_name: Model Context Catalog
site_description: A permission-controlled MCP tool catalog for LLM clients
repo_url: https://github.com/opensanctions/followthemoney
repo_name: model-context-catalog
theme:
  name: material
  palette:
    - scheme: default
      media: "(prefers-color-scheme: light)"
      toggle:
        icon: lucide/moon
        name: Switch to dark mode
    - scheme: slate
      media: "(prefers-color-scheme: dark)"
      toggle:
        icon: lucide/sun
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.tabs.link

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - tables
  - toc:
      permalink: true

plugins:
  - offline

copyright: "&copy; 2025 C4ADS"

extra_css:
  - stylesheets/orange.css

nav:
  - Home: index.md
  - MCP Interface: mcp.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
    - Configuration: getting-started/configuration.md
    - CLI Reference: cli.md
  - Tools:
    - Tool Format: tools/yaml-format.md
    - Python Tools: tools/python.md
    - Exec Tools: tools/exec.md
    - Parameters: tools/parameters.md
    - Environment Variables: tools/env-vars.md
    - Resource Limits: tools/limits.md
  - Auth & Permissions:
    - Overview: auth/overview.md
    - Users & Groups: auth/users-groups.md
    - Auth Backends: auth/backends.md
  - Contrib Tools:
    - Overview: contrib/index.md
    - HTTP: contrib/http.md
    - Filesystem: contrib/fs.md
    - System: contrib/system.md
    - Text: contrib/text.md
    - Time: contrib/time.md
    - Archives: contrib/archive.md
