site_name: Model Context Catalog
site_description: A permission-controlled MCP tool catalog for LLM clients
repo_url: https://github.com/your-org/mcc
repo_name: mcc

theme:
  name: material
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.tabs.link

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
  - Tools:
    - YAML Format: tools/yaml-format.md
    - Parameters: tools/parameters.md
    - Environment Variables: tools/env-vars.md
  - Auth & Permissions:
    - Overview: auth/overview.md
    - Users & Groups: auth/users-groups.md
    - Auth Backends: auth/backends.md
  - CLI Reference:
    - mcc user: cli/user.md
    - mcc tool: cli/tool.md
    - mcc mcp: cli/mcp.md
  - Contrib Tools: contrib.md
