env_file: osint.env
groups: [osint,companies]
tools:
  - name: opencorporates_search
    curl: "https://api.opencorporates.com/v0.4/companies/search?q={{ q | urlencode }}{% if jurisdiction_code %}&jurisdiction_code={{ jurisdiction_code }}{% endif %}&per_page={{ per_page }}"
    example: 'opencorporates_search(q="Acme Corporation",jurisdiction_code="us_de")'
    description: |
      Search the OpenCorporates database of 200M+ company registrations worldwide.
      Returns company names, registration numbers, jurisdictions, registered addresses, and status.
      No API key required for basic search. Use jurisdiction_code to narrow by country/state (e.g. us_de, gb, de).
    params:
      - name: q
        type: str
        required: true
        description: Company name or keyword to search.
      - name: jurisdiction_code
        type: str
        required: false
        default: ""
        description: Jurisdiction filter, e.g. us_de (Delaware), gb (UK), de (Germany). Leave blank for global.
      - name: per_page
        type: int
        required: false
        default: 20
        description: Number of results per page. Default 20, max 100.

  - name: propublica_nonprofit
    curl: "https://projects.propublica.org/nonprofits/api/v2/search.json?q={{ q | urlencode }}"
    example: 'propublica_nonprofit(q="Red Cross")'
    description: |
      Browse millions of annual IRS 990 returns filed by US tax-exempt organizations via ProPublica's Nonprofit Explorer.
      Returns organization names, EINs, revenue, expenses, executive compensation, and filing years.
      Search by organization name, person name, or city. No API key required.
    params:
      - name: q
        type: str
        required: true
        description: |
          Keyword search string. Searches organization name, alternate name, and city.
          Use quotes for exact phrases: "Delta Dental"
          Use + to require terms: delta +evanston
          Use - to exclude terms: delta -dental
    transform:
      - jq '.organizations[]'

  - name: companies_house_search
    curl: "-u \"$COMPANIES_HOUSE_API_KEY:\" 'https://api.company-information.service.gov.uk/search/companies?q={{ q | urlencode }}&items_per_page={{ per_page }}'"
    example: 'companies_house_search(q="Cambridge Analytica")'
    description: |
      Search the UK Companies House official register of limited companies.
      Returns company name, company number, status, type, registered address, and incorporation date.
      Covers all UK-registered companies. Requires COMPANIES_HOUSE_API_KEY in osint.env —
      register free at https://developer.company-information.service.gov.uk/
    params:
      - name: q
        type: str
        required: true
        description: Company name or keyword to search.
      - name: per_page
        type: int
        required: false
        default: 20
        description: Number of results to return. Default 20, max 100.

  - name: icij_offshore_search
    curl: "https://offshoreleaks.icij.org/api/v1/search?q={{ q | urlencode }}&c={{ country | urlencode }}&j={{ jurisdiction | urlencode }}&cat={{ category }}"
    example: 'icij_offshore_search(q="Mossack Fonseca")'
    description: |
      Search the ICIJ Offshore Leaks database spanning the Panama Papers, Pandora Papers,
      Paradise Papers, and other investigations into offshore finance.
      Returns matching entities, officers, intermediaries, and addresses with linked dataset source.
      No API key required.
    params:
      - name: q
        type: str
        required: true
        description: Name of entity, person, officer, or intermediary to search.
      - name: country
        type: str
        required: false
        default: ""
        description: Filter by country code (e.g. RU, GB, CN). Leave blank for global.
      - name: jurisdiction
        type: str
        required: false
        default: ""
        description: Filter by offshore jurisdiction (e.g. BVI, PAN). Leave blank for all.
      - name: category
        type: int
        required: false
        default: 0
        description: "Entity category filter: 0=all, 1=entity, 2=officer, 3=intermediary, 4=address."

  - name: importyeti_search
    curl: "https://www.importyeti.com/api/search?q={{ q | urlencode }}"
    example: 'importyeti_search(q="Tesla")'
    description: |
      Search US customs import records for companies shipping goods into the United States.
      Returns matching companies with supplier names, countries of origin, shipment counts,
      and product descriptions sourced from US Bill of Lading data. No API key required.
    params:
      - name: q
        type: str
        required: true
        description: Company name to search import records for.

  - name: opensanctions_search
    curl: "-H \"Authorization: ApiKey $OPENSANCTIONS_API_KEY\" 'https://api.opensanctions.org/search/default?q={{ q | urlencode }}&limit={{ limit }}'"
    example: 'opensanctions_search(q="Arkady Rotenberg")'
    description: |
      Screen individuals and entities against global sanctions lists, PEP (Politically Exposed
      Persons) databases, and watchlists via OpenSanctions.
      Returns matching entities with sanctioning authority, program, listing date, and aliases.
      Requires OPENSANCTIONS_API_KEY in osint.env — register at https://www.opensanctions.org/api/
    params:
      - name: q
        type: str
        required: true
        description: Person or entity name to screen against sanctions and watchlists.
      - name: limit
        type: int
        required: false
        default: 10
        description: Maximum number of results to return. Default 10, max 50.
