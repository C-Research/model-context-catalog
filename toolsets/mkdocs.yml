site_name: MCC Contrib
site_description: "Reference documentation for MCC contrib toolsets — utils and OSINT."
repo_url: https://github.com/C-Research/model-context-catalog
repo_name: model-context-catalog

theme:
  name: material
  palette:
    - scheme: default
      media: "(prefers-color-scheme: light)"
      toggle:
        icon: lucide/moon
        name: Switch to dark mode
    - scheme: slate
      media: "(prefers-color-scheme: dark)"
      toggle:
        icon: lucide/sun
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.tabs.link

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - tables
  - toc:
      permalink: true

plugins:
  - offline

copyright: "&copy; 2026 C4ADS"

extra_css:
  - stylesheets/blue.css

nav:
  - Overview: index.md
  - Utils:
      - Overview: utils/index.md
      - HTTP: utils/http.md
      - Filesystem: utils/fs.md
      - System: utils/system.md
      - Text: utils/text.md
      - Time: utils/time.md
      - Archives: utils/archive.md
  - OSINT:
      - Infosec & Network: infosec.md
      - Companies & Business: companies.md
      - Government & Records: gov.md
      - Geolocation: geo.md
      - Transport & Aviation: transport.md
      - Environment & Maritime: environment.md
      - Conflict & Humanitarian: conflict.md
      - Cryptocurrency: crypto.md
      - People & Social: people.md
      - News & Media: news.md
      - Academic Research: academic.md
      - Web Archives: search.md
