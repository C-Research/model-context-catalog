env_file: osint.env
groups: [osint,crypto]
tools:
  - name: blockchain_rawtx
    curl: "https://blockchain.info/rawtx/{{ tx_hash }}"
    example: 'blockchain_rawtx(tx_hash="4a5e1e4baab89f3a32518a88c31bc87f618f76673e2cc77ab2127b7afdeda33b")'
    description: |
      Fetch raw Bitcoin transaction data from Blockchain.info by transaction hash.
      Returns inputs, outputs, value, fee, block height, and confirmation count.
      No API key required.
    params:
      - name: tx_hash
        type: str
        required: true
        description: Bitcoin transaction hash (txid).

  - name: blockchain_rawblock
    curl: "https://blockchain.info/rawblock/{{ block_hash }}"
    example: 'blockchain_rawblock(block_hash="000000000019d6689c085ae165831e934ff763ae46a2a6c172b3f1b60a8ce26f")'
    description: |
      Fetch raw Bitcoin block data from Blockchain.info by block hash or height.
      Returns block header, transaction list, timestamp, difficulty, and miner info.
      No API key required.
    params:
      - name: block_hash
        type: str
        required: true
        description: Bitcoin block hash or block height.

  - name: blockchain_rawaddr
    curl: "https://blockchain.info/rawaddr/{{ bitcoin_address }}?limit={{ limit }}&offset={{ offset }}"
    example: 'blockchain_rawaddr(bitcoin_address="1A1zP1eP5QGefi2DMPTfTL5SLmv7Divf")'
    description: |
      Fetch Bitcoin address summary from Blockchain.info.
      Returns total received, total sent, current balance, and transaction history.
      No API key required.
    params:
      - name: bitcoin_address
        type: str
        required: true
        description: Bitcoin address (base58 or bech32 format).
      - name: limit
        type: int
        default: 10
        description: Optional limit parameter to show n transactions
      - name: offset
        type: int
        description: Optional offset parameter to skip the first n transactions

  - name: blockchair
    curl: "https://api.blockchair.com/{{ chain }}/dashboards/{% if chain == 'bitcoin' or chain == 'ethereum' or chain == 'litecoin' or chain == 'bitcoin-cash' %}{% if query | length == 64 %}transaction{% else %}address{% endif %}{% else %}address{% endif %}/{{ query }}"
    example: 'blockchair(chain="ethereum", query="0x742d35Cc6634C0532925a3b844Bc454e4438f44e")'
    description: |
      Look up a transaction or address across multiple blockchains using the Blockchair API.
      Auto-detects whether query is a transaction (64-char hex) or address.
      Supported chains: bitcoin, ethereum, litecoin, bitcoin-cash, dogecoin, dash, zcash,
        bitcoin-sv, monero, ripple, stellar, cardano, polkadot, solana, tron.
      No API key required for basic lookups (1800 req/hour limit).
    params:
      - name: chain
        type: str
        required: true
        description: Blockchain to query, e.g. bitcoin, ethereum, litecoin.
      - name: query
        type: str
        required: true
        description: Transaction hash (64 hex chars) or wallet address to look up.
