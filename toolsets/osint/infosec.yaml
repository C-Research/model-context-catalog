env_file: osint.env
groups: [osint, infosec]
tools:
  - name: crtsh
    curl: "https://crt.sh/?dNSName={{ domain }}&output=json"
    example: 'crtsh(domain="%.example.com")'
    description: |
      Search crt.sh certificate transparency logs for TLS certificates issued for a domain.
      Returns JSON with certificate details including SANs, issuer, and validity dates.
      Useful for subdomain enumeration and certificate monitoring. No API key required.
    params:
      - name: domain
        type: str
        required: true
        description: Domain name to search. Use %.example.com to include all subdomains.

  - name: virustotal
    curl: "-H 'x-apikey: ${VIRUSTOTAL_API_KEY}' 'https://www.virustotal.com/api/v3/{{ type }}s/{{ indicator | urlencode }}'"
    example: 'virustotal(indicator="275a021bbfb6489e54d471899f7db9d1663fc695ec2fe2a2c4538aabf651fd0f", type="file")'
    description: |
      Look up a file hash, URL, domain, or IP address in VirusTotal's multi-engine threat database.
      Returns detection results from 70+ antivirus engines and threat intelligence metadata.
      Requires VIRUSTOTAL_API_KEY (free tier: 4 req/min, 500 req/day).
    params:
      - name: indicator
        type: str
        required: true
        description: The indicator to look up — SHA256 hash, URL, domain, or IP address.
      - name: type
        type: str
        required: false
        default: file
        description: "Indicator type. One of: file, url, domain, ip_address."

  - name: abuseipdb
    curl: "-H 'Key: ${ABUSEIPDB_API_KEY}' -H 'Accept: application/json' -G 'https://api.abuseipdb.com/api/v2/check' --data-urlencode 'ipAddress={{ ip }}' -d 'maxAgeInDays={{ max_age_days }}'"
    example: 'abuseipdb(ip="185.220.101.45")'
    description: |
      Check an IP address against the AbuseIPDB database of reported malicious IPs.
      Returns abuse confidence score (0-100), ISP, usage type, country, and recent report count.
      Requires ABUSEIPDB_API_KEY (free tier: 1000 req/day).
    params:
      - name: ip
        type: str
        required: true
        description: IPv4 or IPv6 address to check.
      - name: max_age_days
        type: int
        required: false
        default: 90
        description: Only count reports within this many days. Default 90.

  - name: nvd_cve
    curl: "https://services.nvd.nist.gov/rest/json/cves/2.0?cveId={{ cve_id | urlencode }}"
    example: 'nvd_cve(cve_id="CVE-2021-44228")'
    description: |
      Look up a CVE by ID in the NIST National Vulnerability Database.
      Returns CVSS scores (v2 and v3), description, affected products, and references.
      No API key required. Example: CVE-2021-44228 (Log4Shell).
    params:
      - name: cve_id
        type: str
        required: true
        description: CVE identifier, e.g. CVE-2021-44228.

  - name: malwarebazaar
    curl: "-X POST https://mb-api.abuse.ch/api/v1/ -d 'query=get_info&hash={{ hash }}'"
    example: 'malwarebazaar(hash="275a021bbfb6489e54d471899f7db9d1663fc695ec2fe2a2c4538aabf651fd0f")'
    description: |
      Look up a file hash in MalwareBazaar to check if it is a known malware sample.
      Returns sample metadata, malware family/tags, first seen date, and file type.
      Accepts MD5, SHA1, or SHA256 hashes. No API key required.
    params:
      - name: hash
        type: str
        required: true
        description: MD5, SHA1, or SHA256 hash of the file to look up.


  - name: dnsdumpster
    example: 'dnsdumpster(domain="example.com")'
    description: |
      DNSDumpster.com is a FREE domain research tool that discovers hosts related to a domain.
      Returns JSON with DNS records and attack surface information: A, MX, NS, TXT records and open ports.
      Useful for mapping an organisation's network footprint. Requires DNSDUMPSTER_API_KEY.
    curl: "-H 'X-API-Key: ${DNSDUMPSTER_API_KEY}' 'https://api.dnsdumpster.com/domain/{{ domain }}'"
    params:
      - name: domain
        type: str
        required: true
        description: Domain name or IPv4/IPv6 address to search.

  - name: urlscan_search
    curl: "https://urlscan.io/api/v1/search/?q={{ q | urlencode }}&size={{ size }}"
    example: 'urlscan_search(q="domain:suspicious-site.com")'
    description: |
      Search the urlscan.io public index for existing website scans matching a query.
      Supports Elasticsearch-style queries: domain:example.com, ip:1.2.3.4, hash:<sha256>, etc.
      Returns JSON with scan results including screenshot URLs, page metadata, detected technologies,
      certificates, and IP/ASN info. No API key required for searching public scans.
    params:
      - name: q
        type: str
        required: true
        description: Search query (e.g. "domain:example.com", "ip:1.2.3.4", "page.domain:phishing.site").
      - name: size
        type: int
        required: false
        default: 10
        description: Number of results to return (max 10000, default 10).

  - name: urlscan_submit
    example: 'urlscan_submit(url="https://suspicious-phishing-site.example.com")'
    curl: >-
      -X POST
      -H 'Content-Type: application/json'
      -H 'API-Key: ${URLSCAN_API_KEY}'
      https://urlscan.io/api/v1/scan/
      -d '{"url":"{{ url }}","visibility":"{{ visibility }}"}'
    description: |
      Submit a URL to urlscan.io for scanning. The scan visits the URL in a browser and captures
      a screenshot, DOM, cookies, HTTP requests, and detected technologies.
      Returns JSON with the scan UUID and result URL (available ~10s after submission).
      Requires URLSCAN_API_KEY (free tier: 100 scans/day at public visibility).
    params:
      - name: url
        type: str
        required: true
        description: URL to scan (must include scheme, e.g. "https://example.com").
      - name: visibility
        type: str
        required: false
        default: public
        description: Scan visibility — "public" (searchable by anyone), "unlisted", or "private".

  - name: nmap_scan
    exec: "nmap -oN - -p {{ ports }} -T{{ timing }} {{ arguments }} {{ target }}"
    limits:
      timeout: 300
    example: 'nmap_scan(target="192.168.1.1")'
    description: |
      Scan a host, IP address, or CIDR range with nmap.
      Returns normal text output including open ports, service names, and versions.
      Requires nmap to be installed on the host system (brew install nmap / apt install nmap).
      Note: OS detection (-O) and SYN scan (-sS) require root privileges.
    params:
      - name: target
        type: str
        required: true
        description: Host, IP address, or CIDR range to scan (e.g. "192.168.1.1", "scanme.nmap.org", "10.0.0.0/24").
      - name: ports
        type: str
        required: false
        default: "21,22,23,25,53,80,110,143,443,445,3306,3389,5900,8080,8443"
        description: Ports to scan. Comma-separated list, range (e.g. "1-1024"), or "-" for all 65535 ports.
      - name: timing
        type: str
        required: false
        default: "4"
        description: "Timing template 0-5 (0=paranoid, 3=normal, 4=aggressive, 5=insane). Default 4."
      - name: arguments
        type: str
        required: false
        default: "-sV"
        description: Extra nmap flags (e.g. "-sV" for version detection, "-O" for OS detection, "-A" for all).

  - curl: "http://ip-api.com/json/{{ query }}?fields={{ fields | join(',') }}"
    name: geolocate
    example: 'geolocate(query="8.8.8.8")'
    description: returns geolocation data about where the speicifc address originates from using ip-api.com
    groups: [public, http]
    params:
      - name: query
        description: can be a single IPv4/IPv6 address or a domain name. If you don't supply a query the current IP address will be used.
        type: str
      - name: fields
        type: list
        default: []
        description: Specific fields to only return eg status,message,query,country,city
