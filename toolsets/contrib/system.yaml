groups: [ admin, system ]
tools:
  - fn: toolsets.contrib.system:get_env
    example: "get_env(keys=[\"PATH\", \"HOME\", \"USER\"])"
  - fn: toolsets.contrib.system:list_env
  - fn: toolsets.contrib.system:info
    name: platform
  - fn: toolsets.contrib.system:path
    name: pythonpath
  - fn: toolsets.contrib.system:set_env
    example: "set_env(key=\"MY_VAR\", value=\"my_value\")"
  - fn: toolsets.contrib.subprocess:bash
    example: "bash(command=\"ps aux | grep python\")"
  - name: python
    exec: python -c 'import json, sys; exec(json.load(sys.stdin)["source"])'
    description: run arbitrary python code
    stdin: true
    example: "python(source=\"import sys; print(sys.version)\")"
    params:
      - name: source
        type: str

  - name: man
    exec: man {{ cmd | quote }} | cat
    description: The man utility finds and displays online manual documentation pages.
    example: "man(cmd=\"curl\")"
    params:
      - name: cmd
        type: str
        description: command to lookup

  - name: uname
    exec: uname -a
    description: The uname command writes the name of the operating system
      implementation to standard output.
