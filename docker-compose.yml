services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'" ]
      interval: 10s
      timeout: 5s
      retries: 10

  mcc:
    build: .
    environment:
      - MCC_ELASTICSEARCH__HOST=elasticsearch
      - MCC_AUTH=dev-admin
      - MCC_CONTRIB=true
    volumes:
      - model-cache:/cache
      # Mount local tool files:
      # - ./my-tools:/tools
    ports:
      - "8000:8000"
    depends_on:
      elasticsearch:
        condition: service_healthy

volumes:
  es-data:
  model-cache:
